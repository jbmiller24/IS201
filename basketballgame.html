<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BYU Arcade Basketball</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: white;
    font-family: Arial, sans-serif;
}

.arcade-frame {
    position: relative;
    border: 6px solid #0057B8;
    border-radius: 18px;
    box-shadow: 0 0 25px #0057B8;
}

canvas {
    display: block;
    border-radius: 12px;
    background: linear-gradient(#003366, #001a33);
}

.scoreboard {
    position: absolute;
    top: 12px;
    left: 15px;
    font-size: 22px;
    color: white;
    text-shadow: 0 0 10px #0057B8;
}

.back-btn {
    position: absolute;
    top: 12px;
    right: 15px;
    padding: 10px 14px;
    background: #002E5D;
    border: 2px solid #0057B8;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.back-btn:hover {
    background: #0057B8;
    transform: scale(1.05);
}
</style>
</head>

<body>

<div class="arcade-frame">
    <div class="scoreboard">Score: <span id="score">0</span></div>
    <button class="back-btn" onclick="goBack()">BYU Basketball</button>
    <canvas id="game" width="900" height="500"></canvas>
</div>

<!-- 🎧 Crowd cheer -->
<audio id="cheer" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5c8b0f6d7f.mp3?filename=cheering-6313.mp3"></audio>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const cheer = document.getElementById("cheer");

let score = 0;
const scoreEl = document.getElementById("score");

/* ---------------- BALL ---------------- */
let ball = {
    x: 120,
    y: 380,
    r: 14,
    vx: 0,
    vy: 0,
    moving: false
};

/* ---------------- HOOP ---------------- */
let hoop = {
    x: 520,
    y: 180,
    rimGap: 45
};

const gravity = 0.32;

/* ---------------- INPUT ---------------- */
let dragging = false;
let startX, startY;
let mouse = {x: 0, y: 0};

function goBack() {
    window.location.href = "fromScratch.html";
}

/* ---------------- MOUSE ---------------- */
canvas.addEventListener("mousedown", (e) => {
    if (ball.moving) return;

    const rect = canvas.getBoundingClientRect();
    let mx = e.clientX - rect.left;
    let my = e.clientY - rect.top;

    let dx = mx - ball.x;
    let dy = my - ball.y;

    if (Math.sqrt(dx*dx + dy*dy) < 30) {
        dragging = true;
        startX = mx;
        startY = my;
    }
});

canvas.addEventListener("mousemove", (e) => {
    const rect = canvas.getBoundingClientRect();
    mouse.x = e.clientX - rect.left;
    mouse.y = e.clientY - rect.top;
});

canvas.addEventListener("mouseup", () => {
    if (!dragging) return;

    let dx = startX - mouse.x;
    let dy = startY - mouse.y;

    ball.vx = dx * 0.16;
    ball.vy = dy * 0.16;

    ball.moving = true;
    dragging = false;
});

/* ---------------- RESET ---------------- */
function resetBall() {
    ball.x = 120;
    ball.y = 380;
    ball.vx = 0;
    ball.vy = 0;
    ball.moving = false;
}

/* ---------------- UPDATE ---------------- */
function update() {
    if (ball.moving) {
        ball.vy += gravity;
        ball.x += ball.vx;
        ball.y += ball.vy;

        if (ball.y > canvas.height - ball.r) resetBall();

        if (
            ball.x > hoop.x &&
            ball.x < hoop.x + hoop.rimGap &&
            ball.y > hoop.y &&
            ball.y < hoop.y + 15 &&
            ball.vy > 0
        ) {
            score++;
            scoreEl.textContent = score;

            cheer.currentTime = 0;
            cheer.play();

            hoop.x = Math.max(480, hoop.x - 25);

            resetBall();
        }
    }
}

/* ---------------- 🪵 REALISTIC WOOD COURT ---------------- */
function drawCourt() {
    // base hardwood gradient
    const gradient = ctx.createLinearGradient(0, 300, 0, canvas.height);
    gradient.addColorStop(0, "#e0b77a");
    gradient.addColorStop(0.5, "#c89555");
    gradient.addColorStop(1, "#b07a3f");

    ctx.fillStyle = gradient;
    ctx.fillRect(0, 300, canvas.width, 200);

    // wood plank horizontal lines
    ctx.strokeStyle = "rgba(90, 55, 25, 0.25)";
    for (let y = 300; y < canvas.height; y += 18) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }

    // vertical plank variation
    for (let x = 0; x < canvas.width; x += 60) {
        ctx.beginPath();
        ctx.moveTo(x, 300);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }

    // subtle arena light reflection
    const shine = ctx.createRadialGradient(
        canvas.width/2, 380, 50,
        canvas.width/2, 380, 300
    );

    shine.addColorStop(0, "rgba(255,255,255,0.08)");
    shine.addColorStop(1, "rgba(255,255,255,0)");

    ctx.fillStyle = shine;
    ctx.fillRect(0, 300, canvas.width, 200);
}

/* ---------------- HOOP ---------------- */
function drawHoop() {
    ctx.strokeStyle = "#ff8c00";
    ctx.lineWidth = 5;
    ctx.beginPath();
    ctx.moveTo(hoop.x, hoop.y);
    ctx.lineTo(hoop.x + hoop.rimGap, hoop.y);
    ctx.stroke();

    ctx.fillStyle = "white";
    ctx.fillRect(hoop.x + 40, hoop.y - 50, 8, 70);
}

/* ---------------- NET ---------------- */
function drawNet() {
    ctx.strokeStyle = "rgba(255,255,255,0.6)";
    ctx.lineWidth = 1;

    for (let i = 0; i <= 6; i++) {
        let t = i / 6;
        let x = hoop.x + hoop.rimGap * t;

        ctx.beginPath();
        ctx.moveTo(x, hoop.y);
        ctx.lineTo(x - 5, hoop.y + 25);
        ctx.lineTo(x, hoop.y + 50);
        ctx.stroke();
    }

    ctx.beginPath();
    ctx.moveTo(hoop.x, hoop.y + 50);
    ctx.lineTo(hoop.x + hoop.rimGap, hoop.y + 50);
    ctx.stroke();
}

/* ---------------- BALL ---------------- */
function drawBall() {
    ctx.fillStyle = "#d97706";
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();

    // curved seams
    ctx.strokeStyle = "#5a2d0c";
    ctx.lineWidth = 2;

    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, -Math.PI/2, Math.PI/2);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r * 0.9, 0, Math.PI);
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r * 0.9, Math.PI, Math.PI * 2);
    ctx.stroke();
}

/* ---------------- ARC PREVIEW ---------------- */
function drawArcPreview() {
    if (!dragging) return;

    let dx = startX - mouse.x;
    let dy = startY - mouse.y;

    let vx = dx * 0.16;
    let vy = dy * 0.16;

    let x = ball.x;
    let y = ball.y;

    ctx.strokeStyle = "white";
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 5]);

    ctx.beginPath();

    for (let i = 0; i < 30; i++) {
        vy += gravity * 0.6;
        x += vx * 0.25;
        y += vy * 0.25;

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    }

    ctx.stroke();
    ctx.setLineDash([]);
}

/* ---------------- LOOP ---------------- */
function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawCourt();
    update();

    drawHoop();
    drawNet();
    drawBall();
    drawArcPreview();

    requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
